<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Щелочные металлы - Викторина 9 класс</title>
    
    <style>
        :root {
            --metal-silver: #C0C0C0;
            --metal-light: #E8E8E8;
            --metal-dark: #2F4F4F;
            --flame-lithium: #FF69B4;
            --flame-sodium: #FFD700;
            --flame-potassium: #9370DB;
            --text-light: #F0F0F0;
            --text-dark: #1C1C1C;
            --bg-gradient-start: #2F4F4F;
            --bg-gradient-end: #696969;
            --glass-bg: rgba(192, 192, 192, 0.15);
            --glass-border: rgba(255, 215, 0, 0.5);
            --glass-blur: 12px;
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, 
                var(--bg-gradient-start), 
                var(--bg-gradient-end));
        }
        
        .glass-container {
            max-width: 600px;
            width: 90%;
            padding: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            animation: floatIn 0.5s ease-out;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-align: center;
            color: var(--text-light);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 50px;
            text-align: center;
            color: var(--flame-sodium);
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .btn {
            display: block;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 15px;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 2px solid var(--flame-sodium);
            color: var(--text-light);
        }
        
        .btn:hover {
            transform: translateY(-5px);
            border-color: var(--flame-lithium);
            box-shadow: 0 0 30px var(--flame-lithium);
        }
        
        .btn.teacher {
            border-color: var(--flame-potassium);
        }
        
        .btn.teacher:hover {
            border-color: var(--flame-potassium);
            box-shadow: 0 0 30px var(--flame-potassium);
        }
        
        .footer {
            margin-top: 50px;
            text-align: center;
            color: var(--metal-light);
            opacity: 0.7;
            font-size: 0.9rem;
        }
        
        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <h1>🧪 ЩЕЛОЧНЫЕ<br>МЕТАЛЛЫ</h1>
        <p class="subtitle">9 класс • Химия элементов IA группы</p>
        
        <div class="buttons">
            <a href="teacher.html" class="btn teacher">👨‍🔬 УЧИТЕЛЬ</a>
            <a href="student.html" class="btn">🧑‍🔬 УЧЕНИК</a>
        </div>
        
        <div class="footer">
            ⚡ 30 вопросов • 1-3 балла • Realtime
        </div>
    </div>
</body>
</html>
